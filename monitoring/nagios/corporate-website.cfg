# ===================================================
# Nagios Host Definition - NexaCorp Corporate Website
# File: corporate-website.cfg
# Location: /usr/local/nagios/etc/objects/
# ===================================================

# ==================== Host Definition ====================
define host {
    use                     linux-server
    host_name               nexacorp-corporate-website
    alias                   NexaCorp Corporate Website Server
    address                 192.168.1.100
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
    notifications_enabled   1
    contact_groups          admins
    check_command           check-host-alive
    statusmap_image         server.png
    icon_image              server.png
    notes                   NexaCorp Corporate Website - Production Server
    notes_url               https://wiki.nexacorp.com/monitoring/corporate-website
    action_url              https://grafana.nexacorp.com/d/corporate-website
}

# ==================== Host Group ====================
define hostgroup {
    hostgroup_name          nexacorp-web-servers
    alias                   NexaCorp Web Servers
    members                 nexacorp-corporate-website
}

# ==================== HTTP Service Check ====================
define service {
    use                     generic-service
    host_name               nexacorp-corporate-website
    service_description     HTTP - Corporate Website
    check_command           check_http!-H 192.168.1.100 -p 80 -u / -e "200,301,302" -w 5 -c 10
    max_check_attempts      4
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
    notifications_enabled   1
    contact_groups          admins
    notes                   Checks HTTP availability of the corporate website
}

# ==================== HTTPS Service Check ====================
define service {
    use                     generic-service
    host_name               nexacorp-corporate-website
    service_description     HTTPS - Corporate Website (SSL)
    check_command           check_http!-H 192.168.1.100 -p 443 -S -u / -e "200,301,302" -w 5 -c 10
    max_check_attempts      4
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
    notifications_enabled   1
    contact_groups          admins
    notes                   Checks HTTPS availability with SSL certificate validation
}

# ==================== HTTP Response Time ====================
define service {
    use                     generic-service
    host_name               nexacorp-corporate-website
    service_description     HTTP Response Time
    check_command           check_http!-H 192.168.1.100 -p 80 -u / -w 2 -c 5
    max_check_attempts      3
    check_interval          5
    retry_interval          2
    check_period            24x7
    notification_interval   60
    notification_period     24x7
    notifications_enabled   1
    contact_groups          admins
    notes                   Monitors HTTP response time (warning at 2s, critical at 5s)
}

# ==================== Disk Usage ====================
define service {
    use                     generic-service
    host_name               nexacorp-corporate-website
    service_description     Disk Usage - Root Partition
    check_command           check_local_disk!20%!10%!/
    max_check_attempts      3
    check_interval          15
    retry_interval          5
    check_period            24x7
    notification_interval   60
    notification_period     24x7
    notifications_enabled   1
    contact_groups          admins
    notes                   Monitors disk space usage on root partition
}

# ==================== CPU Load ====================
define service {
    use                     generic-service
    host_name               nexacorp-corporate-website
    service_description     CPU Load
    check_command           check_local_load!5.0,4.0,3.0!10.0,8.0,6.0
    max_check_attempts      3
    check_interval          5
    retry_interval          2
    check_period            24x7
    notification_interval   60
    notification_period     24x7
    notifications_enabled   1
    contact_groups          admins
    notes                   Monitors CPU load average (1, 5, 15 minute intervals)
}

# ==================== Memory Usage ====================
define service {
    use                     generic-service
    host_name               nexacorp-corporate-website
    service_description     Memory Usage
    check_command           check_local_swap!20%!10%
    max_check_attempts      3
    check_interval          10
    retry_interval          5
    check_period            24x7
    notification_interval   60
    notification_period     24x7
    notifications_enabled   1
    contact_groups          admins
    notes                   Monitors memory and swap usage
}

# ==================== SSH Service ====================
define service {
    use                     generic-service
    host_name               nexacorp-corporate-website
    service_description     SSH Access
    check_command           check_ssh
    max_check_attempts      3
    check_interval          10
    retry_interval          2
    check_period            24x7
    notification_interval   60
    notification_period     24x7
    notifications_enabled   1
    contact_groups          admins
    notes                   Monitors SSH service availability
}

# ==================== Contact Definition ====================
define contact {
    contact_name            devops-admin
    use                     generic-contact
    alias                   DevOps Administrator
    email                   devops@nexacorp.com
    service_notification_period     24x7
    host_notification_period        24x7
    service_notification_options    w,u,c,r
    host_notification_options       d,u,r
    service_notification_commands   notify-service-by-email
    host_notification_commands      notify-host-by-email
}

# ==================== Contact Group ====================
define contactgroup {
    contactgroup_name       nexacorp-devops
    alias                   NexaCorp DevOps Team
    members                 devops-admin
}
