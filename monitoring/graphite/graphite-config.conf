# ===================================================
# Graphite Configuration - NexaCorp Corporate Website
# Storage Schema & Aggregation Rules
# ===================================================

# ==================== storage-schemas.conf ====================
# Location: /opt/graphite/conf/storage-schemas.conf
# Defines retention policies for different metric paths

[nexacorp_website_realtime]
pattern = ^nexacorp\.website\.realtime\.
retentions = 10s:6h,1m:7d

[nexacorp_website]
pattern = ^nexacorp\.website\.
retentions = 1m:7d,5m:30d,15m:1y

[nexacorp_system]
pattern = ^nexacorp\.system\.
retentions = 1m:7d,5m:30d,1h:2y

[nexacorp_docker]
pattern = ^nexacorp\.docker\.
retentions = 1m:7d,5m:30d,15m:1y

[nexacorp_kubernetes]
pattern = ^nexacorp\.kubernetes\.
retentions = 1m:7d,5m:30d,15m:1y

[default]
pattern = .*
retentions = 60s:1d,5m:7d,15m:30d,1h:1y

# ==================== storage-aggregation.conf ====================
# Location: /opt/graphite/conf/storage-aggregation.conf
# Defines how data points are aggregated

[min]
pattern = \.min$
xFilesFactor = 0.1
aggregationMethod = min

[max]
pattern = \.max$
xFilesFactor = 0.1
aggregationMethod = max

[sum]
pattern = \.count$
xFilesFactor = 0
aggregationMethod = sum

[default_average]
pattern = .*
xFilesFactor = 0.5
aggregationMethod = average


