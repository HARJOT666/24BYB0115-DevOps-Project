# ===================================================
# Kubernetes Deployment - NexaCorp Corporate Website
# 2 Replicas | Rolling Update | Resource Limits
# ===================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-website
  namespace: nexacorp
  labels:
    app: corporate-website
    version: "1.0.0"
    environment: production
    managed-by: jenkins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corporate-website
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  minReadySeconds: 10
  revisionHistoryLimit: 5
  template:
    metadata:
      labels:
        app: corporate-website
        version: "1.0.0"
    spec:
      containers:
        - name: corporate-website
          image: nexacorp/corporate-website:latest
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
