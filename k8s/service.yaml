# ===================================================
# Kubernetes Service - NexaCorp Corporate Website
# Type: NodePort | Port: 30080
# ===================================================

apiVersion: v1
kind: Service
metadata:
  name: corporate-website-service
  namespace: nexacorp
  labels:
    app: corporate-website
    environment: production
spec:
  type: NodePort
  selector:
    app: corporate-website
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
      name: http
